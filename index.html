<script type="text/babel" data-presets="react">

const { useState, useRef, useCallback, useEffect } = React;
function _sheetUrl(){ return (localStorage.getItem("mg_sheet_url")||"").trim(); }
window.__mgDriveUrl = function(id){ return "https://drive.google.com/thumbnail?id="+encodeURIComponent(id)+"&sz=w1600"; };
var IDB_NAME="mathguide_drive", IDB_STORE="kv", _idbP=null;
function _idb(){ if(_idbP) return _idbP; _idbP=new Promise(function(res,rej){ var r=indexedDB.open(IDB_NAME,1); r.onupgradeneeded=function(){ try{ r.result.createObjectStore(IDB_STORE); }catch(e){} }; r.onsuccess=function(){ res(r.result); }; r.onerror=function(){ rej(r.error); }; }); return _idbP; }
function _idbGet(k){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).get(k); t.onsuccess=function(){ res(t.result==null?null:t.result); }; t.onerror=function(){ res(null); }; }); }); }
function _idbSet(k,v){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction(IDB_STORE,"readwrite").objectStore(IDB_STORE).put(v,k); t.onsuccess=function(){ res(true); }; t.onerror=function(){ res(false); }; }); }); }
function _idbDel(k){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction(IDB_STORE,"readwrite").objectStore(IDB_STORE).delete(k); t.onsuccess=function(){ res(true); }; t.onerror=function(){ res(false); }; }); }); }
function _idbKeys(){ return _idb().then(function(db){ return new Promise(function(res){ var t=db.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).getAllKeys(); t.onsuccess=function(){ res(t.result||[]); }; t.onerror=function(){ res([]); }; }); }); }
function _postSet(k,val){ var url=_sheetUrl(); if(!url) return; try{ fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"set",key:k,value:val})}); }catch(e){} }
function _postImg(k,media,b64,imgName){ var url=_sheetUrl(); if(!url) return; try{ fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"img",imgKey:k,media:media||"image/jpeg",b64:b64,imgName:imgName||""})}); }catch(e){} }
function _imgName(o){
  try{
    var d = (o && o.ts) ? new Date(o.ts) : new Date();
    var p2 = function(n){ return (n<10?"0":"")+n; };
    var name = String(d.getFullYear()).slice(2)+p2(d.getMonth()+1)+p2(d.getDate())+"_"+p2(d.getHours())+"-"+p2(d.getMinutes());
    var num = (o && (o.number || (o.result && o.result.number))) || "";
    if(!num){ var m=String((o&&o.summary)||"").match(/\d+/); num = m?m[0]:""; }
    return name + (num?("_"+num+"번"):"") + ".jpg";
  }catch(e){ return ""; }
}
function _push(k,v){
  var url=_sheetUrl(); if(!url) return;
  if(k.indexOf("pdf:")===0) return;
  if(k.indexOf("prob:")===0){
    var o; try{ o=JSON.parse(v); }catch(e){ _postSet(k,v); return; }
    var noImg=Object.assign({},o); delete noImg.b64; delete noImg.media; delete noImg.__key;
    _postSet(k, JSON.stringify(noImg));
    if(o && o.b64){ _postImg(k, o.media, o.b64, _imgName(o)); }

}
function _del(k){ var url=_sheetUrl(); if(!url) return; try{ fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"delete",key:k})}); }catch(e){} }

  async set(k,v){ await _idbSet(k,v); _push(k,v); return {key:k,value:v}; },
  async delete(k){ await _idbDel(k); _del(k); return {key:k,deleted:true}; },
  async list(prefix){ var ks=await _idbKeys(); return {keys: ks.filter(function(k){ return !prefix || (typeof k==="string" && k.indexOf(prefix)===0); })}; },
};
window.__mgPull = function(){
  return new Promise(function(resolve){
    var url=_sheetUrl(); if(!url){ resolve(false); return; }
    var cb="mgcb"+Date.now(); var s=document.createElement("script"); var done=false;

          var imgMap={};

          for(var i=0;i<rows.length;i++){

function readBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => { const d = String(r.result || ""); const c = d.indexOf(","); res(c < 0 ? "" : d.slice(c + 1)); };
    r.onerror = () => rej(new Error("read"));
    r.readAsDataURL(file);
  });
}

function processImage(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => {
      const dataUrl = String(r.result || "");
      const comma = dataUrl.indexOf(",");
      if (comma < 0) { rej(new Error("read")); return; }
      const b64 = dataUrl.slice(comma + 1);
      let media = (file.type || "image/jpeg").toLowerCase();
      if (media === "image/jpg") media = "image/jpeg";
      if (!["image/jpeg", "image/png", "image/gif", "image/webp"].includes(media)) { rej(new Error("unsupported:" + media)); return; }
      res({ b64, media, preview: dataUrl });
    };
    r.onerror = () => rej(new Error("read"));
    r.readAsDataURL(file);
  });
}

function parseLoose(text) {
  const start = text.indexOf("{");
  if (start === -1) throw new Error("JSON을 찾지 못함");
  let body = text.slice(start);
  const lastClose = body.lastIndexOf("}");
  if (lastClose !== -1) { try { return JSON.parse(body.slice(0, lastClose + 1)); } catch (e) {} }
  const stack = []; let inStr = false, esc = false, out = "";
  for (const ch of body) {
    out += ch;
    if (esc) { esc = false; continue; }
    if (ch === "\\") { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === "{") stack.push("}"); else if (ch === "[") stack.push("]");
    else if (ch === "}" || ch === "]") stack.pop();
  }
  if (inStr) out += '"';
  out = out.replace(/,\s*$/, "").replace(/:\s*$/, ':""');
  while (stack.length) out += stack.pop();
  return JSON.parse(out);
}

// KaTeX 자동 렌더러가 $$(디스플레이)와 $(인라인)를 섞어 만나면 짝을 잘못 맞춰
// 뒤쪽 수식을 놓치는 일이 있다. 모든 $$를 $로 통일해 섞임을 제거한다.
function normDollars(s) { return String(s).replace(/\$\$/g, "$"); }
function deepNorm(v) {
  if (typeof v === "string") return normDollars(v);
  if (Array.isArray(v)) return v.map(deepNorm);
  if (v && typeof v === "object") { const o = {}; for (const k in v) o[k] = deepNorm(v[k]); return o; }
  return v;
}

async function askClaude(blocks, prompt) {
  if (!(localStorage.getItem("mg_api_key") || "").trim()) {
    throw new Error("HTML에서 분석하려면 ⚙ 설정에 본인 API 키를 넣으세요. (무료는 claude.ai 아티팩트에서)");
  }
  let resp;
  try {
    resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json", "x-api-key": (localStorage.getItem("mg_api_key")||"").trim(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: (localStorage.getItem("mg_model")||"claude-sonnet-4-6"), max_tokens: 1000,
        messages: [{ role: "user", content: [...blocks, { type: "text", text: prompt }] }],
      }),
    });
  } catch (e) { throw new Error("네트워크 연결 실패"); }
  const data = await resp.json();
  if (data && data.error) throw new Error(data.error.message || "API 오류");
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  if (!text.trim()) throw new Error("빈 응답");
  try { return deepNorm(parseLoose(text)); } catch (e) { throw new Error("응답 해석 실패(잘렸을 수 있음)"); }
}

    for (const k of keys) { try { const r = await window.storage.get(k); if (r && r.value) { const o = JSON.parse(r.value); o.__key = k; items.push(o); } } catch (e) {} }
    items.sort((a, b) => (b.ts || 0) - (a.ts || 0));
    return items;
  } catch (e) { return []; }
}

async function loadFolders() {

              <div style={{ display: "flex", justifyContent: "space-between", gap: 10, marginBottom: 14, background: C.warnSoft, border: `1px solid ${C.warn}44`, borderRadius: 11, padding: "11px 14px", color: C.warn, fontSize: 13.5, lineHeight: 1.5 }}>
                <span>{libMsg}</span>
                <button className="mg-btn" onClick={() => setLibMsg("")} style={{ border: "none", background: "transparent", color: C.warn, fontFamily: "inherit", fontSize: 16, lineHeight: 1 }}>×</button>
              </div>
            )}
            {backupText && (
              <div style={{ marginBottom: 14, background: C.card, border: `1px solid ${C.clay}`, borderRadius: 12, padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <span className="mg-serif" style={{ fontSize: 14, fontWeight: 700 }}>기기 이전 백업 ({backupText.length.toLocaleString()}자)</span>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button className="mg-btn" onClick={() => { const t = document.getElementById("mg-backup-ta"); if (t) { t.focus(); t.select(); try { document.execCommand("copy"); setLibMsg("복사됨 ✓ HTML ⚙ ‘가져오기’에 붙여넣으세요."); } catch (e) {} } }}
                      style={{ border: "none", borderRadius: 8, padding: "7px 13px", background: C.clay, color: "#fff", fontSize: 12.5, fontWeight: 700, fontFamily: "inherit" }}>전체 복사</button>
                    <button className="mg-btn" onClick={() => setBackupText("")}
                      style={{ border: `1px solid ${C.line}`, borderRadius: 8, padding: "7px 11px", background: C.card, color: C.ink, fontSize: 12.5, fontFamily: "inherit" }}>닫기</button>
                  </div>
                </div>
                <textarea id="mg-backup-ta" readOnly value={backupText} onFocus={(e) => e.target.select()}
                  style={{ width: "100%", height: 90, fontFamily: "ui-monospace, monospace", fontSize: 11, border: `1px solid ${C.line}`, borderRadius: 8, padding: 10, background: C.paper, color: C.ink, boxSizing: "border-box", resize: "vertical" }} />
                <div style={{ fontSize: 12, color: C.muted, marginTop: 6, lineHeight: 1.5 }}>이 내용을 전체 복사 → HTML 버전 상단 ⚙ ‘가져오기’ 칸에 붙여넣고 ‘가져오기’를 누르면 보관함이 그대로 옮겨집니다.</div>
              </div>
            )}
            {library.length === 0 ? (
              <div style={{ textAlign: "center", padding: "64px 20px", color: C.muted }}>
                <div className="mg-serif" style={{ fontSize: 17, fontWeight: 700, marginBottom: 7, color: C.ink }}>아직 저장된 문제가 없어요</div>
                <div style={{ fontSize: 14, lineHeight: 1.6 }}>문제를 분석한 뒤 ‘보관함에 저장’을 누르면 PDF·단원별로 모입니다.</div>
              </div>
            ) : openFolder ? (
              /* ── PDF 폴더 안 ── */
              <>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
                  <button className="mg-btn" onClick={() => setOpenFolder(null)}
                    style={{ border: `1px solid ${C.line}`, borderRadius: 10, padding: "8px 13px", background: C.card, color: C.ink, fontSize: 13.5, fontWeight: 700, fontFamily: "inherit" }}>← 보관함</button>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div className="mg-serif" style={{ fontSize: 17, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>📁 {folderMap[openFolder]?.name || "PDF"}</div>
                    <div style={{ fontSize: 12.5, color: C.muted }}>{folderItems.length}문제 보관됨</div>
                  </div>
                  <button className="mg-btn" onClick={() => analyzeMoreFromPdf(openFolder, folderMap[openFolder]?.name)}
                    style={{ border: "none", borderRadius: 10, padding: "9px 14px", background: C.clay, color: "#fff", fontSize: 13, fontWeight: 700, fontFamily: "inherit", whiteSpace: "nowrap" }}>＋ 다른 번호 분석</button>
                </div>
                {sortBar()}
                {(() => { const ctx = "pdf:" + openFolder; const arr = applySort(folderItems, ctx); return (
                  <div style={gridStyle}>{arr.map(p => cardEl(p, { reorder: sortMode === "manual", ctx, sortedItems: arr }))}</div>
                ); })()}
              </>
            ) : openMyFolder ? (
              /* ── 내 폴더 안 ── */
              <>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
                  <button className="mg-btn" onClick={() => { setOpenMyFolder(null); setSelecting(false); setSelectedIds([]); }}
                    style={{ border: `1px solid ${C.line}`, borderRadius: 10, padding: "8px 13px", background: C.card, color: C.ink, fontSize: 13.5, fontWeight: 700, fontFamily: "inherit" }}>← 보관함</button>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div className="mg-serif" style={{ fontSize: 17, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>📁 {myFolders.find(f => f.id === openMyFolder)?.name || "폴더"}</div>
                    <div style={{ fontSize: 12.5, color: C.muted }}>{myFolderItems.length}문제</div>
                  </div>
                  <button className="mg-btn" onClick={() => { setSelecting(s => !s); setSelectedIds([]); }}
                    style={{ border: `1px solid ${selecting ? C.clay : C.line}`, borderRadius: 10, padding: "8px 14px", background: selecting ? C.claySoft : C.card, color: selecting ? C.clay : C.ink, fontSize: 13, fontWeight: 700, fontFamily: "inherit" }}>{selecting ? "완료" : "선택"}</button>
                </div>
                {myFolderItems.length ? sortBar() : null}
                {myFolderItems.length
                  ? (() => { const ctx = "folder:" + openMyFolder; const arr = applySort(myFolderItems, ctx); return (
                      <div style={gridStyle}>{arr.map(p => cardEl(p, { selecting, draggable: !selecting, reorder: sortMode === "manual" && !selecting, ctx, sortedItems: arr }))}</div>
                    ); })()
                  : <div style={{ color: C.muted, fontSize: 14, padding: "24px 4px", lineHeight: 1.6 }}>이 폴더는 비어 있어요. ‘미분류’에서 문제를 선택하거나 끌어다 넣어 보세요.</div>}
                {moveBar()}
              </>
            ) : (
              /* ── 보관함 홈 ── */
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                  <div style={{ display: "flex", gap: 7 }}>
                    {tabBtn(libMode === "my", () => setLibMode("my"), "내 폴더")}
                    {tabBtn(libMode === "pdf", () => setLibMode("pdf"), "PDF별")}
                    {tabBtn(libMode === "unit", () => setLibMode("unit"), "단원별")}
                  </div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    {missingIntent > 0 && (
                      <button className="mg-btn" onClick={backfillIntent} disabled={backfilling}
                        style={{ border: `1px solid ${C.clay}`, borderRadius: 10, padding: "8px 14px", background: C.claySoft, color: C.clay, fontSize: 13, fontWeight: 700, fontFamily: "inherit", whiteSpace: "nowrap" }}>
                        {backfilling ? (backfillMsg || "정리 중…") : `✨ 출제 의도 채우기 (${missingIntent})`}
                      </button>
                    )}
                    <button className="mg-btn" onClick={exportBackup}
                      style={{ border: `1px solid ${C.line}`, borderRadius: 10, padding: "8px 14px", background: C.card, color: C.ink, fontSize: 13, fontWeight: 400, fontFamily: "inherit", whiteSpace: "nowrap" }}>📦 기기 이전 백업</button>
                    <button className="mg-btn" onClick={exportHTML}
                      style={{ border: `1px solid ${C.line}`, borderRadius: 10, padding: "8px 14px", background: C.card, color: C.ink, fontSize: 13, fontWeight: 400, fontFamily: "inherit", whiteSpace: "nowrap" }}>⤓ HTML로 내보내기</button>
                  </div>
                </div>

                {libMode === "my" ? (
                  <>
                    <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
                      <button className="mg-btn" onClick={() => openNewFolder(false)}
                        style={{ border: `1px solid ${C.clay}`, borderRadius: 10, padding: "8px 14px", background: C.claySoft, color: C.clay, fontSize: 13, fontWeight: 700, fontFamily: "inherit" }}>＋ 새 폴더</button>
                      <button className="mg-btn" onClick={() => { setSelecting(s => !s); setSelectedIds([]); }}
                        style={{ border: `1px solid ${selecting ? C.clay : C.line}`, borderRadius: 10, padding: "8px 14px", background: selecting ? C.claySoft : C.card, color: selecting ? C.clay : C.ink, fontSize: 13, fontWeight: 700, fontFamily: "inherit" }}>{selecting ? "완료" : "선택해서 모으기"}</button>
                    </div>
                    {myFolders.length > 0 && (
                      <div style={{ ...gridStyle, marginBottom: 22 }}>{myFolders.map(myFolderCard)}</div>
                    )}
                    <div className="mg-eyebrow" style={{ fontSize: 11, color: C.muted, fontWeight: 700, margin: "4px 0 12px" }}>미분류 · {uncategorized.length}</div>
                    {uncategorized.length ? sortBar() : null}
                    {uncategorized.length
                      ? (() => { const ctx = "__loose"; const arr = applySort(uncategorized, ctx); return (
                          <div style={gridStyle}>{arr.map(p => cardEl(p, { selecting, draggable: !selecting, reorder: sortMode === "manual" && !selecting, ctx, sortedItems: arr }))}</div>
                        ); })()
                      : <div style={{ color: C.muted, fontSize: 14, padding: "8px 4px" }}>미분류 문제가 없어요.</div>}
                    {!selecting && myFolders.length === 0 && (
                      <div style={{ color: C.muted, fontSize: 13, marginTop: 16, lineHeight: 1.6 }}>‘＋ 새 폴더’로 폴더를 만들고, ‘선택해서 모으기’로 문제를 골라 폴더에 담아 보세요. (PC에선 카드를 폴더로 끌어다 놓아도 됩니다.)</div>
                    )}
                    {moveBar()}
                  </>
                ) : libMode === "pdf" ? (
                  <>
                    {folders.length > 0 && (
                      <div style={{ ...gridStyle, marginBottom: loose.length ? 22 : 0 }}>
                        {folders.map(fd => {
                          const nums = fd.items.map(numOf).filter(Boolean).sort((a, b) => Number(a) - Number(b));
                          const uset = Array.from(new Set(fd.items.flatMap(p => p.concepts || []))).slice(0, 3);
                          return (
                            <div key={fd.id} className="mg-card mg-btn" onClick={() => setOpenFolder(fd.id)}
                              style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 15, padding: 16, cursor: "pointer" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <span style={{ fontSize: 26 }}>📁</span>
                                <div style={{ minWidth: 0 }}>
                                  <div className="mg-serif" style={{ fontSize: 15.5, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{fd.name}</div>
                                  <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{fd.items.length}문제</div>
                                </div>
                              </div>
                              {nums.length > 0 && <div style={{ fontSize: 12.5, color: C.muted, marginTop: 11, lineHeight: 1.5 }}>문제 {nums.join(", ")}번</div>}
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 10 }}>
                                {uset.map((c, i) => <span key={i} style={{ fontSize: 11.5, fontWeight: 700, color: C.clay, background: C.claySoft, padding: "3px 9px", borderRadius: 999 }}>{c}</span>)}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                    {loose.length > 0 && (
                      <>
                        <div className="mg-eyebrow" style={{ fontSize: 11, color: C.muted, fontWeight: 700, margin: "4px 0 12px" }}>낱장 (이미지 · {loose.length})</div>
                        {sortBar()}
                        {(() => { const ctx = "__loose_pdf"; const arr = applySort(loose, ctx); return (
                          <div style={gridStyle}>{arr.map(p => cardEl(p, { reorder: sortMode === "manual", ctx, sortedItems: arr }))}</div>
                        ); })()}
                      </>
                    )}
                  </>
                ) : (
                  <>
                    <div className="mg-tabs" style={{ marginBottom: 14 }}>
                      {tabBtn(activeUnit === "__all", () => setActiveUnit("__all"), `전체 ${library.length}`)}
                      {units.map(u => tabBtn(activeUnit === u, () => setActiveUnit(u), `${u} ${library.filter(p => (p.concepts || []).includes(u)).length}`))}
                    </div>
                    {sortBar()}
                    {(() => { const ctx = "__unit:" + activeUnit; const arr = applySort(filtered, ctx); return (
                      <div style={gridStyle}>{arr.map(p => cardEl(p, { reorder: sortMode === "manual", ctx, sortedItems: arr }))}</div>
                    ); })()}
                  </>
                )}
              </>
            )}
          </div>
          </>
        )}
      </div>
    </div>
  );
}

function Eyebrow({ children, color = C.clay }) {
  return <div className="mg-eyebrow" style={{ fontSize: 11.5, color, fontWeight: 700 }}>{children}</div>;
}
function Block({ title, hint, children }) {
  return (
    <section style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 15, padding: "19px 21px", marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 7 }}>
        <h2 className="mg-serif" style={{ fontSize: 18, fontWeight: 700, margin: 0, letterSpacing: "-.01em" }}>{title}</h2>
        <span style={{ fontSize: 12.5, color: C.muted }}>{hint}</span>
      </div>
      <div>{children}</div>
    </section>
  );
}


(async function(){
  try{ if(window.__mgPull) await window.__mgPull(); }catch(e){}
  try{
    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
    var boot=document.getElementById("boot"); if(boot) boot.remove();
  }catch(e){ if(window.__mgShow) window.__mgShow("렌더 오류: "+(e&&e.message||e)); else throw e; }
})();

</script>
</body>
</html>
